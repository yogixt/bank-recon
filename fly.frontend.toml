app = "bank-recon-web"
primary_region = "sin"

[build]
  dockerfile = "frontend/Dockerfile"

[env]
  VITE_API_URL = ""

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
