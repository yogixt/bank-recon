version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
      POSTGRES_DB: bank_recon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d bank_recon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/bank_recon
      SYNC_DATABASE_URL: postgresql://recon:recon@postgres:5432/bank_recon
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - uploads:/tmp/bank-recon-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/bank_recon
      SYNC_DATABASE_URL: postgresql://recon:recon@postgres:5432/bank_recon
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - uploads:/tmp/bank-recon-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://recon:recon@postgres:5432/bank_recon
      SYNC_DATABASE_URL: postgresql://recon:recon@postgres:5432/bank_recon
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - uploads:/tmp/bank-recon-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000

volumes:
  pgdata:
  uploads:
